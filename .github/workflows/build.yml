name: Build APK

# 코드를 main 브랜치에 올리거나(push), 수동으로 실행 버튼을 누르면 빌드 시작
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: JDK 17 설치
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Gradle 실행 권한 부여
        run: chmod +x ./gradlew

      - name: APK 빌드
        run: ./gradlew assembleDebug

      - name: 빌드된 APK 업로드
        uses: actions/upload-artifact@v4
        with:
          name: OverlayDraw-apk
          path: app/build/outputs/apk/debug/app-debug.apk
